env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
name: Build
  
on:
  push:
    branches:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Updated from v2

  build_android:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Updated from v2

      - name: Cache Node.js
        uses: actions/cache@v4 # Updated from v2 (This was causing the hard failure)
        with:
            path: ~/.npm
            key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
            restore-keys: |
              ${{ runner.os }}-node-modules-

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Updated from v2
        with:
          node-version: 12

      - name: Set up OpenJDK 8
        run: |
          sudo apt update
          sudo apt install openjdk-8-jdk -y
          echo "JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64" >> $GITHUB_ENV

      - name: Setup Android SDK (API Level 19)
        uses: android-actions/setup-android@v3 # Updated from v2
        with:
          api-level: 19
          build-tools: 25.0.3

      - name: Download NDK r17b
        run: |
          curl -o android-ndk-r17b-linux-x86_64.zip https://dl.google.com/android/repository/android-ndk-r17b-linux-x86_64.zip
          unzip android-ndk-r17b-linux-x86_64.zip -d $HOME/android-ndk
          rm android-ndk-r17b-linux-x86_64.zip

      - name: Set NDK path and Local Properties
        run: |
          echo "NDK_HOME=$HOME/android-ndk/android-ndk-r17b" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/android-ndk/android-ndk-r17b" >> $GITHUB_ENV
          # Critical: Create local.properties inside the android folder
          echo "ndk.dir=$HOME/android-ndk/android-ndk-r17b" > telon-gateway-app/android/local.properties

      - name: Install Dependencies
        run: npm install
        working-directory: telon-gateway-app

      - name: Build Android App Bundle
        run: |
          mkdir -p android/app/build/intermediates/assets/release/
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/build/intermediates/assets/release/index.android.bundle --assets-dest android/app/build/intermediates/res/merged/release
        working-directory: telon-gateway-app

      - name: Build Android Release
        run: |
          cd android
          chmod +x gradlew 
          ./gradlew clean
          ./gradlew bundleRelease -Pkeystore.password=${{ secrets.KEYSTORE_PASSWORD }}
        working-directory: telon-gateway-app

  download_bundle:
    runs-on: ubuntu-latest
    needs: build_android
    steps:
      - name: Checkout Repository # Added to ensure files exist for cp
        uses: actions/checkout@v4

      - name: Archive Bundle
        uses: actions/upload-artifact@v4 # Updated from v2
        with:
          name: android-bundle
          path: telon-gateway-app/android/app/build/outputs/bundle/release/app-release.aab
